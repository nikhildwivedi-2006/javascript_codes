<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let city = "Bhopal";
        document.write(`${city.indexOf('h')}<br>`);
        document.write(`${city.indexOf('g')}<br>`);
        document.write(`${city.substring(1,4)}<br>`);
        document.write(`${city.toLowerCase()}<br>`);
        document.write(`${city.toUpperCase()}<br>`);
   </script>
</head>
